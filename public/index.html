<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ultraviolet Proxy</title>
  <script src="/uv.bundle.js" defer></script>
  <script src="/uv.client.js" defer></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("uv-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const input = document.getElementById("uv-url").value;
        location.href = __uv$config.prefix + __uv$config.encodeUrl(input);
      });
    });
  </script>
</head>
<body>
  <h1>Ultraviolet Proxy</h1>
  <form id="uv-form">
    <input id="uv-url" placeholder="Enter a URL..." required />
    <button type="submit">Go</button>
  </form>
</body>
</html>
