<!-- dist/index.html -->
<!DOCTYPE html>
<html>
  <head>
<script src="/uv.bundle.js"></script>
<script src="/uv.config.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/uv/uv.sw.js', {
        scope: __uv$config.prefix,
      });
    });
  }
</script>
    <title>Ultraviolet Proxy</title>
    <script src="/uv.bundle.js"></script>
    <script src="/uv.client.js" defer></script>
    <script src="/uv.config.js" defer></script>
    <script src="/uv.sw.js" defer></script>
  </head>
  <body>
    <form id="uv-form">
      <input id="uv-address" placeholder="Enter a URL..." />
      <button type="submit">Go</button>
    </form>
  </body>
</html>
